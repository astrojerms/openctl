run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    # Default linters
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Additional linters
    - bodyclose        # Check HTTP response body is closed
    # - copyloopvar      # Detect loop variable capture issues (Go 1.22+) - disabled, requires Go 1.22+
    - durationcheck    # Check for duration multiplication issues
    - errname          # Check error naming conventions
    - errorlint        # Find issues with error wrapping
    - gofmt            # Check code is formatted
    - goimports        # Check imports are organized
    - gocritic         # Comprehensive Go linter
    - gosec            # Security checks
    - misspell         # Find misspellings
    # - nilerr           # Check for nil error returns - too many false positives with optional response parsing
    # - noctx            # Check HTTP requests use context - not needed for this codebase
    # - prealloc         # Suggest preallocating slices - disabled, too noisy
    - predeclared      # Find shadowed predeclared identifiers
    # - revive           # Replacement for golint - disabled, too many false positives with empty blocks
    - unconvert        # Remove unnecessary type conversions
    - unparam          # Find unused function parameters
    - whitespace       # Check for unnecessary whitespace

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      - (io.Closer).Close
      - (net/http.ResponseWriter).Write

  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - hugeParam           # Can be noisy for structs passed by value intentionally
      - appendAssign        # append to different slice is intentional pattern
      - appendCombine       # Stylistic preference, not a bug
      - ifElseChain         # Stylistic preference, not a bug

  goimports:
    local-prefixes: github.com/openctl/openctl

  gosec:
    excludes:
      - G104  # Audit errors not checked (covered by errcheck)
      - G304  # File path from variable (often intentional in CLI tools)

  govet:
    enable-all: true
    disable:
      - fieldalignment  # Can be noisy, micro-optimization
      - shadow          # Too many false positives with short-lived err vars

  misspell:
    locale: US

  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
        disabled: true  # Not required for internal packages
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code

  staticcheck:
    checks: ["all"]

issues:
  exclude-rules:
    # Allow init functions
    - linters:
        - gochecknoinits
      text: "init function"

    # Test files can have longer functions and more complexity
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
        - gosec
        - unparam
        - prealloc

    # Examples can be less strict
    - path: example_
      linters:
        - gocritic
        - unparam

    # Intentionally ignored errors (cleanup operations)
    - text: "Error return value of .*(Close|DeleteVM|RegenerateCloudInit).* is not checked"
      linters:
        - errcheck

    # Encoder.Encode in main.go is intentional (stdout encoding)
    - text: "Error return value of `encoder.Encode` is not checked"
      linters:
        - errcheck

    # GetTemplate intentionally ignores error to check if template exists
    - text: "Error return value of .*(GetTemplate|GetVMConfig|GetVMIPAddress).* is not checked"
      linters:
        - errcheck

    # Intentional unchecked put for boot order (non-critical)
    - text: "Error return value of `c.put` is not checked"
      linters:
        - errcheck

    # TLS skip verify is intentional for lab/development environments
    - text: "G402: TLS InsecureSkipVerify"
      linters:
        - gosec

    # Unused fields kept for future API compatibility
    - text: "field `ticket` is unused"
      linters:
        - unused

    - text: "field `csrfToken` is unused"
      linters:
        - unused

    - text: "func `.*authenticate` is unused"
      linters:
        - unused

    # Shadow on url package is acceptable in these cases
    - text: "importShadow: shadow of imported package 'url'"
      linters:
        - gocritic

    # Context param kept for interface compliance
    - text: "unused-parameter: parameter 'ctx' seems to be unused"
      linters:
        - revive

    # AllocateIPs error is intentionally ignored - returns nil map on error
    - text: "Error return value of `resources.AllocateIPs` is not checked"
      linters:
        - errcheck

    # SSH InsecureIgnoreHostKey is intentional for lab/homelab environments
    - text: "G106: Use of ssh InsecureIgnoreHostKey"
      linters:
        - gosec

  max-issues-per-linter: 0
  max-same-issues: 0
