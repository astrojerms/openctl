# A VM whose cloud-init password comes from a secret reference instead of an
# inline plaintext value. The controller resolves the marker at apply time and
# hands the real password to Proxmox, but the stored manifest (SQLite, the
# on-disk mirror, and git) keeps the marker — the password never lands in a
# commit.
#
# First put the secret on disk (0600, under the controller's <state-dir>/secrets):
#   printf 'hunter2' > ~/.openctl/controller/secrets/web-01.pw
#
# Or reference an environment variable set on the controller:
#   password: { $secret: { env: WEB01_PASSWORD } }
#
# Or, once a backend is configured (Tier 2), any registered provider:
#   password: { $secret: { provider: vault, key: "secret/data/web#password" } }
apiVersion: proxmox.openctl.io/v1
kind: VirtualMachine
metadata:
  name: web-01
spec:
  node: pve1
  template:
    name: ubuntu-22.04-cloudinit
  cpu:
    cores: 2
    sockets: 1
  memory:
    size: 2048
  disks:
    - name: scsi0
      storage: local-lvm
      size: 20G
  networks:
    - name: net0
      bridge: vmbr0
      model: virtio
  cloudInit:
    user: ubuntu
    password:
      $secret:
        file: web-01.pw
  startOnCreate: true
