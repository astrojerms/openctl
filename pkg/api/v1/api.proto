syntax = "proto3";

package openctl.v1;

import "google/protobuf/struct.proto";
import "google/api/annotations.proto";

option go_package = "github.com/openctl/openctl/pkg/api/v1;apiv1";

// PingService is the trivial smoke-test surface for the controller. Used by
// `openctl ping` to verify TLS + auth + the gRPC pipeline end-to-end without
// depending on any provider code.
service PingService {
  // Ping echoes the caller's message and returns the server's version.
  rpc Ping(PingRequest) returns (PingResponse) {
    option (google.api.http) = { get: "/v1/ping" };
  }
}

message PingRequest {
  // Optional caller-supplied string echoed back. Useful for correlating
  // requests/responses in scripted checks.
  string message = 1;
}

message PingResponse {
  // The caller's `message`, echoed verbatim.
  string echo = 1;
  // Semver-ish version string of the controller binary.
  string server_version = 2;
  // Short git SHA of the build ("dev" for unlinked builds). Injected at
  // link time via -ldflags. Lets the UI/CLI confirm which commit is
  // running without guessing from behavior.
  string git_commit = 3;
  // RFC3339 build timestamp ("dev" for unlinked builds).
  string build_time = 4;
}

// ResourceService is the controller's primary surface for managing resources
// declaratively. From Phase 2 it operates synchronously per the
// no-op-on-existing semantics; Phase 3 adds async dispatch via OperationService
// for long-running applies (Cluster create, etc).
//
// Phase 2 supports atomic resources (VirtualMachine). Phase 4 adds composite
// resources (Cluster) which spawn child operations.
service ResourceService {
  // Apply creates a resource. Phase 2 is no-op-on-existing: if a resource
  // with the manifest's name already exists, the response carries its
  // observed state without mutating it.
  rpc Apply(ApplyRequest) returns (ApplyResponse) {
    option (google.api.http) = { post: "/v1/resources:apply" body: "*" };
  }

  // Get returns the observed state of a single resource.
  rpc Get(GetRequest) returns (GetResponse) {
    option (google.api.http) = { post: "/v1/resources:get" body: "*" };
  }

  // List returns all resources of a kind.
  rpc List(ListRequest) returns (ListResponse) {
    option (google.api.http) = { post: "/v1/resources:list" body: "*" };
  }

  // Delete removes a resource. Idempotent: delete on a missing resource
  // returns success, not NotFound.
  rpc Delete(DeleteRequest) returns (DeleteResponse) {
    option (google.api.http) = { post: "/v1/resources:delete" body: "*" };
  }

  // Watch streams resource state changes. The first batch of events carries
  // the current snapshot (one ADDED per existing resource matching the
  // filter); subsequent events fire when resources are added, modified, or
  // deleted. UI Phase U1.1: poll-based implementation. Filter is api_version
  // (required) + kind (required) + optional name to watch a single resource.
  rpc Watch(WatchRequest) returns (stream WatchEvent) {
    option (google.api.http) = { post: "/v1/resources:watch" body: "*" };
  }

  // DryRunApply previews what an Apply would do without mutating anything.
  // Runs the same change-plan + catastrophic-check logic the dispatcher
  // would; returns the spec diff against the currently-applied manifest,
  // per-child action verbs for composite resources, and the destructive
  // gates the user would need to check off. UI Phase U4.1: editor calls
  // this on the debounce timer to power the "preview before apply" pane.
  rpc DryRunApply(DryRunApplyRequest) returns (DryRunApplyResponse) {
    option (google.api.http) = { post: "/v1/resources:dryRunApply" body: "*" };
  }

  // ListActions returns the runtime action names supported by the
  // responsible provider for (api_version, kind). Empty when the
  // provider doesn't implement runtime actions. UI Phase U8.12:
  // Detail.svelte calls this once per page load to build the action bar.
  rpc ListActions(ListActionsRequest) returns (ListActionsResponse) {
    option (google.api.http) = { post: "/v1/resources:listActions" body: "*" };
  }

  // InvokeAction runs a runtime action on an existing resource — start,
  // stop, reboot, etc. Distinct from Apply: it doesn't change desired
  // state, just operates on the live instance. Response.message is the
  // provider's short human-readable success text (e.g. a Proxmox task
  // UPID).
  rpc InvokeAction(InvokeActionRequest) returns (InvokeActionResponse) {
    option (google.api.http) = { post: "/v1/resources:invokeAction" body: "*" };
  }

  // GetChildrenGraph returns the composite resource's expansion as a
  // {nodes, edges} DAG for the UI to render. Nodes are the resource itself
  // (root) plus each child the provider's Planner emits (or, for non-Planner
  // composites, the children the provider reports via ChildrenOf). Edges are
  // of two kinds: "owns" (root → each direct child) and "ref" (a child's
  // $ref pointer to a sibling, e.g. a K3sNode's join token → the first
  // server). Node status is a coarse lifecycle pill ("applied" | "pending" |
  // "observed" | "missing"); managed=false marks observed-only nodes with no
  // applied manifest so the UI can render them dim (Phase U9). Returns an
  // empty graph (root node only) for atomic resources.
  rpc GetChildrenGraph(GetChildrenGraphRequest) returns (GetChildrenGraphResponse) {
    option (google.api.http) = { post: "/v1/resources:childrenGraph" body: "*" };
  }
}

message ListActionsRequest {
  string api_version = 1;
  string kind = 2;
}

message ListActionsResponse {
  repeated string actions = 1;
  // action_specs carries the same actions with parameter schemas so the UI can
  // render inputs for actions that take arguments (e.g. a cluster upgrade's
  // target version). Populated for every action; parameterless actions have an
  // empty parameters list. Providers opt into parameters by implementing
  // ActionDescriber; others yield name-only specs. (U10.1)
  repeated ActionSpec action_specs = 2;
}

// ActionSpec describes a runtime action and any parameters it accepts.
message ActionSpec {
  string name = 1;
  // Optional human-readable description for a tooltip/help text.
  string description = 2;
  repeated ActionParameterSpec parameters = 3;
}

// ActionParameterSpec describes one argument an action accepts so the UI can
// render an input and validate before invoking.
message ActionParameterSpec {
  string name = 1;
  // One of "string" | "int" | "bool". The UI renders an appropriate input.
  string type = 2;
  bool required = 3;
  // Optional help text shown alongside the input.
  string description = 4;
  // Optional default value (pre-filled in the UI, string-encoded).
  string default_value = 5;
}

message InvokeActionRequest {
  string api_version = 1;
  string kind = 2;
  string resource_name = 3;
  string action = 4;
  // parameters carries optional key/value arguments for actions that need
  // them (e.g. a target version for a cluster upgrade). Actions that take no
  // parameters ignore it; providers opt in by implementing
  // ParameterizedActioner. Additive and backward-compatible.
  map<string, string> parameters = 5;
}

message InvokeActionResponse {
  string message = 1;
  // Optional URL for actions that resolve to an external resource
  // (e.g. Proxmox noVNC console). UI opens in a new tab.
  string url = 2;
  // Optional downloadable payload for actions that return file content
  // (e.g. k3s Cluster kubeconfig). UI serves as a file download named
  // download_filename with the given content.
  string download_content  = 3;
  string download_filename = 4;
}

message GetChildrenGraphRequest {
  string api_version = 1;
  string kind = 2;
  string name = 3;
}

// GraphNode is one vertex in the composite DAG. id is the stable "kind/name"
// key edges reference; api_version/kind/name carry the full ref so the UI can
// navigate to the node's Detail page on click.
message GraphNode {
  string id = 1;           // "kind/name" — matches GraphEdge.from / .to
  string api_version = 2;
  string kind = 3;
  string name = 4;
  // Coarse lifecycle pill: "applied" (has an applied manifest / observed
  // present), "pending" (planned but not yet applied), "observed"
  // (reported by the provider but not authored by openctl), "missing"
  // (referenced but not found).
  string status = 5;
  // false = observed-only / no applied manifest — the UI renders it dim
  // with a read-only badge (Phase U9.4).
  bool managed = 6;
  // true for the composite resource the request was made against.
  bool root = 7;
}

// GraphEdge connects two nodes by their id. relation is "owns" (root → direct
// child) or "ref" ($ref pointer between children). field, set only for "ref"
// edges, is the dotted source path the ref reads (e.g. "status.nodeToken");
// empty for whole-resource refs and all "owns" edges.
message GraphEdge {
  string from = 1;         // GraphNode.id of the source
  string to = 2;           // GraphNode.id of the target
  string relation = 3;     // "owns" | "ref"
  string field = 4;        // dotted ref field, "ref" edges only
}

message GetChildrenGraphResponse {
  repeated GraphNode nodes = 1;
  repeated GraphEdge edges = 2;
}

message DryRunApplyRequest {
  Resource resource = 1;
}

// DryRunApplyResponse describes the would-be effect of an Apply.
// validation_errors is populated even on otherwise-valid runs so the UI
// can surface schema problems inline without a second SchemaService roundtrip.
message DryRunApplyResponse {
  // Spec-level differences between the submitted manifest and the
  // currently-applied manifest, or empty when this would be the first
  // apply. Same shape as Resource.drift.
  repeated DriftEntry diff = 1;
  // Per-child actions for composite resources (e.g. Cluster → VMs).
  // Empty for atomics. Verbs: "create" | "destroy" | "respec" | "no-op".
  repeated ChildAction children = 2;
  // Required gates: destructive-flag flags the user must explicitly enable
  // before Apply will accept the request. Values match the Apply request
  // boolean fields: "allow_destructive", "i_know_this_breaks_the_cluster".
  repeated string required_gates = 3;
  // Schema validation errors. When non-empty the UI should show them
  // inline; Apply will reject with the same errors anyway.
  repeated string validation_errors = 4;
  // Human-readable single-line summary suitable for a status pill —
  // e.g. "no-op", "would add 1 worker", "would respec dev-cp-0 (destructive)".
  string summary = 5;
  // Same errors as validation_errors, but broken out into (path, message)
  // pairs so the UI can attach each to its offending form field instead
  // of dumping them all in a bottom panel. Empty for schema-less kinds
  // or when validation passed.
  repeated FieldError field_errors = 6;
}

// FieldError attributes a single schema violation to a dotted path
// (e.g. "spec.cpu.cores"). Emitted alongside validation_errors on
// DryRunApplyResponse so the editor can highlight the offending field.
message FieldError {
  string path = 1;
  string message = 2;
}

message ChildAction {
  string verb = 1;       // "create" | "destroy" | "respec" | "no-op"
  string kind = 2;       // e.g. "VirtualMachine"
  string name = 3;
  string detail = 4;     // optional explanation
}

// Resource is the k8s-style envelope for any resource kind. spec/status are
// generic structured values to keep the proto kind-agnostic.
message Resource {
  string api_version = 1;          // e.g. "proxmox.openctl.io/v1"
  string kind = 2;                 // e.g. "VirtualMachine"
  Metadata metadata = 3;
  google.protobuf.Struct spec = 4;
  google.protobuf.Struct status = 5;
  // Phase 5: drift surfaces "the resource set/spec differs from the manifest".
  // Populated only on Get/List responses, after the controller compares the
  // observed state against the persisted desired state. Empty entries means
  // either the resource matches its manifest or no manifest is on file
  // (e.g. resource was created out-of-band).
  repeated DriftEntry drift = 6;
  // Arch Phase 8: children lists resources composed by this one (e.g. a
  // Cluster's member VMs). Populated by Get for composite resources from
  // the provider's persisted state; empty for atomics. Refs carry full
  // apiVersion/kind/name so the UI can navigate without a second lookup.
  repeated ResourceRef children = 7;
}

// ResourceRef is a typed reference to another resource — a fully-qualified
// (apiVersion, kind, name) triple. Used for owner/child relationships
// returned on Resource (arch Phase 8 scoped owner-ref plumbing).
message ResourceRef {
  string api_version = 1;
  string kind = 2;
  string name = 3;
}

// DriftEntry describes a single field where the observed state differs from
// the desired state. path is a dot-separated walk into the spec
// (e.g. "spec.cpus" or "spec.nodes.workers[0].count"); desired and observed
// are the values rendered as strings for human display.
message DriftEntry {
  string path = 1;
  string desired = 2;
  string observed = 3;
}

message Metadata {
  string name = 1;
  map<string, string> labels = 2;
  map<string, string> annotations = 3;
  // Arch Phase 8: owner_refs lists resources that own this one (e.g. a
  // VM owned by its Cluster). Currently always 0 or 1 entry; list shape
  // matches k8s ownerReferences to leave room for multi-owner relationships
  // later. Populated by Get/List for owned resources.
  repeated ResourceRef owner_refs = 4;
}

message ApplyRequest {
  Resource resource = 1;
  // Phase 5 destructive guardrails. allow_destructive permits removing
  // declared children (e.g. scaling a Cluster down). i_know_this_breaks_the_cluster
  // overrides the catastrophic-op block (single-CP recreate, quorum loss,
  // last-worker removal). Both default false; the CLI exposes them as
  // --allow-destructive and --i-know-this-breaks-the-cluster.
  bool allow_destructive = 2;
  bool i_know_this_breaks_the_cluster = 3;
}

message ApplyResponse {
  // operation_id identifies the async operation that will (eventually)
  // converge the resource. Use OperationService.GetOperation to poll for
  // completion, or pass --no-wait to the CLI to fire-and-forget.
  string operation_id = 1;
  // Human-friendly message describing what was submitted.
  string message = 2;
}

message GetRequest {
  string api_version = 1;
  string kind = 2;
  string name = 3;
}

message GetResponse {
  // Observed state from the provider (plus computed drift).
  Resource resource = 1;
  // The desired manifest currently on file in applied_manifests, or unset
  // if no manifest has been applied for this resource. Populated by the
  // controller from manifests.Store.Load — same source the drift diff is
  // computed against. UI uses this to render the "desired" pane next to
  // the observed state without a second round-trip.
  Resource applied = 2;
  // RFC3339 timestamp of the most recent apply for this resource, or
  // empty when applied is unset. Source: applied_manifests.applied_at.
  string applied_at = 3;
}

message ListRequest {
  string api_version = 1;
  string kind = 2;
}

message ListResponse {
  repeated Resource resources = 1;
}

message DeleteRequest {
  string api_version = 1;
  string kind = 2;
  string name = 3;
}

message DeleteResponse {
  // operation_id identifies the async operation; poll via OperationService.
  string operation_id = 1;
  string message = 2;
}

// WatchRequest configures a resource Watch stream. api_version + kind are
// required (you must scope to a kind because there's no cross-kind list
// in the controller); name optional to narrow to one resource.
message WatchRequest {
  string api_version = 1;
  string kind = 2;
  string name = 3;
}

// WatchEvent describes a single resource change. The first batch after
// subscribe carries one ADDED event per existing resource so the client
// gets a complete snapshot before live deltas start.
message WatchEvent {
  enum Type {
    UNKNOWN = 0;
    ADDED = 1;       // first observed (or seen for the first time this stream)
    MODIFIED = 2;    // observed state or drift changed since last emit
    DELETED = 3;     // gone from the controller's view (resource.name still set)
  }
  Type type = 1;
  Resource resource = 2;
}

// ConfigService reads and writes provider entries in
// ~/.openctl/config.yaml. Scope: the common per-provider case (one
// endpoint + one credential). Multi-context / secret-file editing is
// deferred to a future extension.
service ConfigService {
  // ListProviders returns every configured provider with its default
  // endpoint + tokenId. Token secrets are NEVER returned — the response
  // reports has_secret and a bool for whether a secretFile is in use.
  rpc ListProviders(ListProvidersRequest) returns (ListProvidersResponse) {
    option (google.api.http) = { get: "/v1/config/providers" };
  }

  // UpsertProvider creates or updates a provider entry. The single-
  // context + single-credential shape covers the common case. When
  // token_secret is empty, the existing secret is preserved (letting
  // the UI edit endpoint/tokenId without re-typing the secret).
  rpc UpsertProvider(UpsertProviderRequest) returns (UpsertProviderResponse) {
    option (google.api.http) = { post: "/v1/config/providers" body: "*" };
  }

  // DeleteProvider removes a provider entry entirely. Idempotent —
  // deleting a missing provider succeeds.
  rpc DeleteProvider(DeleteProviderRequest) returns (DeleteProviderResponse) {
    option (google.api.http) = { delete: "/v1/config/providers/{name}" };
  }

  // GetControllerConfig returns the editable controller-behavior tunables
  // from ~/.openctl/config.yaml (reconciler + operation retention), with
  // built-in defaults filled in for any omitted block. These are read once
  // at controller startup, so changes need a restart to take effect — the
  // response's restart_required flag is always true, for the UI banner.
  rpc GetControllerConfig(GetControllerConfigRequest) returns (GetControllerConfigResponse) {
    option (google.api.http) = { get: "/v1/config/controller" };
  }

  // UpdateControllerConfig writes the tunables back to config.yaml, merging
  // into (not replacing) the existing file so provider/manifests blocks are
  // preserved. Validates reconciler_interval as a Go duration and rejects a
  // negative retention. Returns the persisted, defaulted values.
  rpc UpdateControllerConfig(UpdateControllerConfigRequest) returns (UpdateControllerConfigResponse) {
    option (google.api.http) = { put: "/v1/config/controller" body: "*" };
  }
}

message ListProvidersRequest {}

message ListProvidersResponse {
  repeated ProviderEntry providers = 1;
}

message ProviderEntry {
  string name = 1;
  // Endpoint of the default context (e.g. Proxmox URL).
  string endpoint = 2;
  // TokenID of the default credential.
  string token_id = 3;
  // True when a token secret is on file (either inline or via
  // tokenSecretFile). Never leaks the secret itself.
  bool has_secret = 4;
  // True when the secret is stored in a file (tokenSecretFile) rather
  // than inline. Purely informational for the UI.
  bool uses_secret_file = 5;
}

message UpsertProviderRequest {
  string name = 1;
  string endpoint = 2;
  string token_id = 3;
  // Empty preserves the existing secret. Non-empty replaces it inline
  // (tokenSecret). Writing to tokenSecretFile is out of scope for the
  // MVP — users who want file-backed secrets edit config.yaml directly.
  string token_secret = 4;
}

message UpsertProviderResponse {
  ProviderEntry provider = 1;
}

message DeleteProviderRequest {
  string name = 1;
}

message DeleteProviderResponse {}

// ControllerConfig carries the editable controller-behavior tunables. All
// are startup-only (baked into their components at construction), so a
// controller restart is needed for a change to take effect.
message ControllerConfig {
  // reconciler.enabled — the background drift ticker. Defaults to true.
  bool reconciler_enabled = 1;
  // reconciler.interval — Go duration between reconcile passes (e.g. "5m",
  // "30s"). Defaults to "5m".
  string reconciler_interval = 2;
  // operations.retainPerResource — completed-op rows kept per resource
  // before pruning. Defaults to 50; must be non-negative.
  int32 op_retain_per_resource = 3;
}

message GetControllerConfigRequest {}

message GetControllerConfigResponse {
  ControllerConfig config = 1;
  // Always true today: every tunable in ControllerConfig is read once at
  // startup, so the UI should tell the user changes apply after a restart.
  bool restart_required = 2;
}

message UpdateControllerConfigRequest {
  ControllerConfig config = 1;
}

message UpdateControllerConfigResponse {
  ControllerConfig config = 1;
  bool restart_required = 2;
}

// TemplateService exposes parameterized starters — templates declare
// a small set of user-fillable parameters and render into a full
// Resource manifest. UI Phase U8+: sidebar "Templates" section, wizard
// form, submit through the normal Apply pipeline.
service TemplateService {
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse) {
    option (google.api.http) = { get: "/v1/templates" };
  }
  rpc GetTemplate(GetTemplateRequest) returns (GetTemplateResponse) {
    option (google.api.http) = { get: "/v1/templates/{name}" };
  }
  rpc RenderTemplate(RenderTemplateRequest) returns (RenderTemplateResponse) {
    option (google.api.http) = { post: "/v1/templates/{name}:render" body: "*" };
  }
}

message ListTemplatesRequest {}

message ListTemplatesResponse {
  repeated TemplateSummary templates = 1;
}

// TemplateSummary is the list-page projection. Enough to render a
// picker card without loading parameter details.
message TemplateSummary {
  string name         = 1;  // wire id, kebab-case
  string display_name = 2;
  string description  = 3;
  string api_version  = 4;  // apiVersion of the produced resource
  string kind         = 5;  // kind of the produced resource
}

message GetTemplateRequest {
  string name = 1;
}

message GetTemplateResponse {
  TemplateSummary summary        = 1;
  repeated TemplateParameter parameters = 2;
}

// TemplateParameter is one user-fillable input. Shape mirrors
// schema/form.Field enough that the UI can render it with the same
// FormField component used for editing manifests.
message TemplateParameter {
  string name         = 1;
  string type         = 2;  // "string" | "int" | "bool"
  string description  = 3;
  bool   required     = 4;
  // JSON-encoded default value, or empty when no default. Encoded to
  // keep the type generic without a Struct wrapper.
  string default_json = 5;
  repeated string enum = 6;
  // Options_kind, when non-empty, tells the UI to populate a
  // dropdown from resources of the referenced kind — same mechanism
  // as CUE @options on schema fields.
  string options_kind = 7;
}

message RenderTemplateRequest {
  string name = 1;
  // Parameter values. Serialised as a Struct (JSON-like) so the client
  // can pass strings, numbers, bools without type wrappers per param.
  google.protobuf.Struct params = 2;
}

message RenderTemplateResponse {
  Resource resource = 1;
}

// OperationService exposes the persisted operation log. Apply/Delete RPCs
// return an operation_id immediately; clients call GetOperation to poll
// until terminal status (succeeded, failed, interrupted).
service OperationService {
  rpc GetOperation(GetOperationRequest) returns (Operation) {
    option (google.api.http) = { get: "/v1/operations/{id}" };
  }
  rpc ListOperations(ListOperationsRequest) returns (ListOperationsResponse) {
    option (google.api.http) = { post: "/v1/operations:list" body: "*" };
  }

  // WatchOperations streams op state transitions. Same poll-based v1 as
  // ResourceService.Watch. Optional filters: by resource (apiVersion/kind/
  // name) and/or by op id (to follow a single op to terminal). Empty
  // filters watch all ops.
  rpc WatchOperations(WatchOperationsRequest) returns (stream OperationEvent) {
    option (google.api.http) = { post: "/v1/operations:watch" body: "*" };
  }

  // UI Phase U7: CancelOperation marks a `pending` op as `cancelled` so the
  // dispatcher skips it when it next claims work. Returns FailedPrecondition
  // when the op is already past pending (running ops require cooperative
  // cancellation in the provider, deferred to a future track).
  rpc CancelOperation(CancelOperationRequest) returns (CancelOperationResponse) {
    option (google.api.http) = { post: "/v1/operations/{id}:cancel" body: "*" };
  }
}

message Operation {
  string id = 1;
  string parent_id = 2;          // empty for top-level ops; populated for child rows
  string type = 3;               // "apply" | "delete" | "step"
  string api_version = 4;
  string kind = 5;
  string resource_name = 6;
  string status = 7;             // pending | running | succeeded | failed | interrupted | cancelled
  string error = 8;              // populated on failed/interrupted/cancelled
  string submitted_at = 9;       // RFC3339
  string started_at = 10;        // empty until claimed
  string completed_at = 11;      // empty until terminal
  Resource result = 12;          // populated on succeeded apply
  // Phase 4.5: human-readable label for sub-step ops (e.g. "install-k3s").
  // Empty for top-level apply/delete unless explicitly set.
  string label = 13;
  // Phase 4.5: child operations for composite resources. Populated only when
  // GetOperation is called with include_children=true (omitted from List
  // responses to keep them cheap).
  repeated Operation children = 14;
  // UI Phase U7: caller source ("CLI" / "UI"). Populated when the op was
  // submitted; lets the history view filter by where work came from.
  string source = 15;
  // UI Phase U7: serialized submitted manifest. Populated only on
  // GetOperation responses (omitted from List/Watch to keep them cheap)
  // so the UI's retry path can pre-fill the editor with the exact YAML
  // the failed/interrupted op was trying to apply.
  string manifest_json = 16;
}

message GetOperationRequest {
  string id = 1;
  // Phase 4.5: include child operations in the response. Children are
  // ordered oldest first. List responses never include children.
  bool include_children = 2;
}

message ListOperationsRequest {
  // All filters optional — empty means match-all.
  string status = 1;
  string api_version = 2;
  string kind = 3;
  string resource_name = 4;
  // Cap on results returned, newest-first. 0 = no cap.
  int32 limit = 5;
  // UI Phase U7: filter by op source (CLI / UI). Empty matches both.
  string source = 6;
  // UI Phase U7: filter by submission time. RFC3339; either side may be
  // empty to leave that end open.
  string since = 7;
  string until = 8;
}

message ListOperationsResponse {
  repeated Operation operations = 1;
}

message CancelOperationRequest {
  string id = 1;
}

message CancelOperationResponse {
  // Final status after the cancel attempt: "cancelled" on success.
  string status = 1;
  // Human-friendly note for the UI.
  string message = 2;
}

// WatchOperationsRequest filters the OperationService.WatchOperations
// stream. All fields optional — empty filters watch every op.
// SessionService mints and revokes per-session tokens. The browser UI
// will exchange the install-time bearer token for a session token via
// Login (UI Phase U1.3 wraps that response in an HttpOnly cookie). gRPC
// callers can use the session token directly as a Bearer header.
service SessionService {
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = { post: "/v1/session/login" body: "*" };
  }
  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = { post: "/v1/session/logout" body: "*" };
  }
  rpc WhoAmI(WhoAmIRequest) returns (WhoAmIResponse) {
    option (google.api.http) = { get: "/v1/session/whoami" };
  }
}

message LoginRequest {
  // Human-readable display name (e.g. browser/device label) shown in
  // session listings. Optional.
  string display_name = 1;
  // TTL in seconds for the new session. 0 = server default
  // (auth.DefaultSessionTTL = 7 days).
  int64 ttl_seconds = 2;
}

message LoginResponse {
  // Raw session token. Pass as `Bearer <token>` in subsequent requests
  // (or wait for U1.3 to wrap as an HttpOnly cookie).
  string token = 1;
  string session_id = 2;
  string expires_at = 3; // RFC3339
}

message LogoutRequest {}
message LogoutResponse {}

message WhoAmIRequest {}

// WhoAmIResponse returns identifying info about the auth credential used
// on the call. For root-bearer-token callers user_id is empty; for
// named-user and session-token callers it carries the user id. role is the
// caller's RBAC level ("viewer" | "editor" | "admin").
message WhoAmIResponse {
  string user_id = 1;
  string session_id = 2; // empty if authenticated via root bearer
  string role = 3;       // RBAC role of the caller
}

// SchemaService introspects the controller's embedded CUE schemas and
// runs validation. UI uses ListSchemas to populate kind pickers,
// GetSchema to feed the Monaco editor's autocomplete / form-schema
// bridge, and Validate to surface errors as the user types.
service SchemaService {
  rpc ListSchemas(ListSchemasRequest) returns (ListSchemasResponse) {
    option (google.api.http) = { get: "/v1/schemas" };
  }
  rpc GetSchema(GetSchemaRequest) returns (GetSchemaResponse) {
    option (google.api.http) = { post: "/v1/schemas:get" body: "*" };
  }
  rpc Validate(ValidateRequest) returns (ValidateResponse) {
    option (google.api.http) = { post: "/v1/schemas:validate" body: "*" };
  }
  // GetFormSchema returns a UI-renderable form-schema tree derived from
  // the CUE schema for (apiVersion, kind). The shape is intentionally
  // generic JSON so the controller's wire format doesn't leak CUE types
  // into the browser. UI Phase U5.1.
  rpc GetFormSchema(GetFormSchemaRequest) returns (GetFormSchemaResponse) {
    option (google.api.http) = { post: "/v1/schemas:getForm" body: "*" };
  }
}

message ListSchemasRequest {}

message ListSchemasResponse {
  repeated SchemaInfo schemas = 1;
}

// SchemaInfo describes one embedded CUE schema. file_name is the relative
// path under internal/schema/schemas/ (e.g. "proxmox/vm.cue") so the
// client can compose links back to source if it wants to.
message SchemaInfo {
  string api_version = 1;   // e.g. "proxmox.openctl.io/v1"
  string kind = 2;          // e.g. "VirtualMachine"
  string provider = 3;      // e.g. "proxmox"
  string file_name = 4;

  // advanced marks a kind that is normally produced by a composite (a Planner
  // parent) rather than authored directly — e.g. a k3s Cluster fans out into
  // K3sNodes + AgentInstalls. owner_kind names that parent kind (same provider);
  // advanced_note is a human explanation the create form shows. Populated by
  // ListSchemas from the provider registry (AdvancedKindDescriber); empty for
  // ordinary top-level kinds. Lets any client mark expert kinds without a
  // hardcoded client-side list.
  bool advanced = 5;
  string owner_kind = 6;
  string advanced_note = 7;
}

message GetSchemaRequest {
  string api_version = 1;
  string kind = 2;
}

message GetSchemaResponse {
  SchemaInfo info = 1;
  // CUE source text. Multi-file packages join all files in deterministic
  // order so a single string is sufficient for editor consumption.
  string cue_source = 2;
}

message ValidateRequest {
  Resource resource = 1;
}

message ValidateResponse {
  // Empty errors[] = valid. Populated = validation failed; each entry is
  // one human-readable diagnostic. No structured location info yet — CUE
  // doesn't surface it cleanly through Validate; future enhancement.
  repeated string errors = 1;
}

message GetFormSchemaRequest {
  string api_version = 1;
  string kind = 2;
}

// GetFormSchemaResponse carries the form-schema tree as an opaque JSON
// document so the controller doesn't need a recursive proto. The browser
// parses it as a Field tree (see ui/src/lib/form.ts) and dispatches on
// the `type` tag at each node.
message GetFormSchemaResponse {
  // JSON-encoded Field tree, see internal/schema/form.Field. Empty when
  // no schema is registered for (apiVersion, kind) — the RPC returns
  // NotFound in that case rather than empty JSON.
  string json = 1;
}

message WatchOperationsRequest {
  string id = 1;             // narrow to one op id (terminate when terminal)
  string api_version = 2;
  string kind = 3;
  string resource_name = 4;
  bool include_children = 5; // populate children on each emitted op
}

// OperationEvent carries an op state transition. The full op is included
// (not a delta); clients render it directly. The first batch after
// subscribe emits all ops matching the filter so the client gets a
// snapshot. terminal=true signals the op reached a terminal status; for
// id-scoped subscribes that's the cue to close the stream.
message OperationEvent {
  Operation operation = 1;
  bool terminal = 2;
}

// RepoService surfaces the controller's on-disk manifest mirror to the UI.
// The mirror is materialized by the dispatcher on every successful
// apply/delete (UI Phase U2.1); when git tracking is enabled (U2.2) each
// commit lands here and an optional remote push is triggered per the
// configured push mode.
//
// Pull is advisory only — it does NOT trigger any reapply or
// reconciliation. The controller treats disk as a one-way materialized
// output; the SQLite applied_manifests table is canonical.
service RepoService {
  rpc GetStatus(GetRepoStatusRequest) returns (GetRepoStatusResponse) {
    option (google.api.http) = { get: "/v1/repo/status" };
  }
  rpc Push(PushRepoRequest) returns (PushRepoResponse) {
    option (google.api.http) = { post: "/v1/repo:push" body: "*" };
  }
  rpc Pull(PullRepoRequest) returns (PullRepoResponse) {
    option (google.api.http) = { post: "/v1/repo:pull" body: "*" };
  }
  // GetResourceHistory lists the git commits that touched a resource's
  // mirrored manifest file, newest first. Empty when git tracking is off
  // or the resource has no committed history.
  rpc GetResourceHistory(GetResourceHistoryRequest) returns (GetResourceHistoryResponse) {
    option (google.api.http) = { post: "/v1/repo:history" body: "*" };
  }
  // GetResourceAtCommit returns a resource's mirrored manifest YAML as it
  // existed at a given commit, for diffing against the current state.
  rpc GetResourceAtCommit(GetResourceAtCommitRequest) returns (GetResourceAtCommitResponse) {
    option (google.api.http) = { post: "/v1/repo:atCommit" body: "*" };
  }
}

message GetRepoStatusRequest {}

// GetRepoStatusResponse is a snapshot of the manifest dir's git status.
// enabled=false means git tracking is off (no `manifests.git.enabled`
// in config); the dir and the other fields still describe the disk mirror.
message GetRepoStatusResponse {
  bool enabled = 1;        // git tracking turned on?
  string dir = 2;          // absolute path to the manifest dir
  string branch = 3;       // current branch ("" if no commits yet)
  string head_sha = 4;     // short SHA of HEAD ("" if no commits yet)
  string remote = 5;       // remote URL ("" if none configured)
  bool clean = 6;          // true when working tree has no changes
  repeated string dirty_paths = 7; // porcelain output (empty when clean)
  // ahead/behind are -1 when no upstream tracking branch exists. ahead
  // counts local-only commits; behind counts remote-only commits.
  int32 ahead = 8;
  int32 behind = 9;
  string push_mode = 10;   // "onCommit" | "periodic" | "manual"
}

message PushRepoRequest {}
message PushRepoResponse {
  string message = 1; // human-readable summary ("pushed N commits to origin/main")
}

message PullRepoRequest {}
message PullRepoResponse {
  string message = 1;
}

// CommitInfo describes one commit that touched a resource's manifest file.
message CommitInfo {
  string sha = 1;          // full commit SHA
  string author = 2;       // author name
  string committed_at = 3; // ISO-8601 author date
  string subject = 4;      // commit subject line
}

message GetResourceHistoryRequest {
  string api_version = 1;
  string kind = 2;
  string name = 3;
}
message GetResourceHistoryResponse {
  repeated CommitInfo commits = 1; // newest first; empty if no history
}

message GetResourceAtCommitRequest {
  string api_version = 1;
  string kind = 2;
  string name = 3;
  string sha = 4; // commit to read the manifest at
}
message GetResourceAtCommitResponse {
  string yaml = 1;  // the manifest YAML at that commit ("" if it didn't exist)
  bool existed = 2; // false when the file was absent at that commit
}
